<div class="d-flex flex-column dialog-overlay bg-body-secondary">
  <div class="d-flex flex-column dialog-content">
    <div
      class="d-flex justify-content-between align-items-center p-3 pt-2 pb-1"
    >
      <h2 class="">
        <i class="bi bi-hand-index pe-3 icon-sm"></i>{{ node.title() }}
      </h2>
      <button class="btn btn-primary" (click)="onClose()">Close</button>
    </div>
    <div class="tab-shell">
      <app-tab [tabs]="tabs" [(activeTabId)]="activeTabId"></app-tab>
    </div>
    <ng-template #detailsTab>
      <div class="p-3 details">
        <div class="mb-3 form-line">
          <label for="frontend-title" class="form-label field-label">Title</label>
          <div class="flex-fill control-column title">
            <input
              type="text"
              class="form-control w-100"
              id="frontend-title"
              [ngModel]="node.title()"
              (ngModelChange)="node.title.set($event)"
            />
          </div>
        </div>
        <div class="mb-3 form-line">
          <label for="frontend-function-name" class="form-label field-label"
            >Function Name</label
          >
          <div class="flex-fill control-column path">
            <input
              type="text"
              class="form-control w-100"
              id="frontend-function-name"
              [ngModel]="node.functionName()"
              (ngModelChange)="node.functionName.set($event)"
            />
          </div>
        </div>
        <div class="mb-3 form-line">
          <label for="frontend-arguments-mode" class="form-label field-label"
            >Arguments Mode</label
          >
          <div class="flex-fill control-column small">
            <select
              class="form-select w-100"
              id="frontend-arguments-mode"
              [ngModel]="node.argumentsMode()"
              (ngModelChange)="node.argumentsMode.set(+$event)"
            >
              <option [ngValue]="ArgumentsMode.ContextPath">Context Path</option>
              <option [ngValue]="ArgumentsMode.FixedJson">Fixed JSON</option>
            </select>
          </div>
        </div>
        @if (node.argumentsMode() === ArgumentsMode.ContextPath) {
          <div class="mb-3 form-line">
            <label for="frontend-arguments-path" class="form-label field-label"
              >Arguments Path</label
            >
            <div class="flex-fill control-column path">
              <input
                type="text"
                class="form-control w-100"
                id="frontend-arguments-path"
                [ngModel]="node.argumentsPath()"
                (ngModelChange)="node.argumentsPath.set($event)"
              />
            </div>
          </div>
        } @else {
          <div class="mb-3 form-line align-start">
            <label for="frontend-arguments-json" class="form-label field-label"
              >Arguments JSON</label
            >
            <div class="flex-fill control-column wide">
              <ngx-monaco-editor
                class="json-editor"
                id="frontend-arguments-json"
                [options]="editorOptionsJson"
                [ngModel]="node.argumentsJson()"
                (ngModelChange)="node.argumentsJson.set($event)"
              ></ngx-monaco-editor>
            </div>
          </div>
        }
        <div class="mb-3 form-line">
          <label for="frontend-result-path" class="form-label field-label"
            >Result Output Path</label
          >
          <div class="flex-fill control-column path">
            <input
              type="text"
              class="form-control w-100"
              id="frontend-result-path"
              [ngModel]="node.resultOutputPath()"
              (ngModelChange)="node.resultOutputPath.set($event)"
            />
          </div>
        </div>
        <div class="mb-3 form-line">
          <label
            for="frontend-chat-persistence"
            class="form-label field-label"
            >Chat Persistence</label
          >
          <div class="flex-fill control-column small">
            <select
              class="form-select w-100"
              id="frontend-chat-persistence"
              [ngModel]="node.chatPersistenceMode()"
              (ngModelChange)="node.chatPersistenceMode.set(+$event)"
            >
              <option [ngValue]="ChatPersistenceMode.None">None</option>
              <option [ngValue]="ChatPersistenceMode.FunctionCallOnly">
                Function Call Only
              </option>
              <option [ngValue]="ChatPersistenceMode.FunctionCallAndResult">
                Function Call And Result
              </option>
            </select>
          </div>
        </div>
        <div class="mb-3 form-line">
          <label
            for="frontend-hide-from-reply"
            class="form-label field-label"
            >Hide From Stream</label
          >
          <div class="flex-fill control-column small">
            <input
              type="checkbox"
              class="form-check-input"
              id="frontend-hide-from-reply"
              [ngModel]="node.hideFromReplyAfterHandled()"
              (ngModelChange)="node.hideFromReplyAfterHandled.set(!!$event)"
            />
          </div>
        </div>
      </div>
    </ng-template>

    <ng-template #inputsTab>
      <div class="bg-body-tertiary p-3">
        <app-context-viewer [contexts]="inputTraces"></app-context-viewer>
      </div>
    </ng-template>
    <ng-template #outputsTab>
      <div class="bg-body-tertiary p-3">
        <app-context-viewer [contexts]="outputTraces"></app-context-viewer>
      </div>
    </ng-template>
  </div>
</div>
